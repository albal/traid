# TRAID lighttpd configuration
# Installed to /etc/lighttpd/conf-available/traid.conf
# Enabled via: lighty-enable-mod traid

server.modules += (
    "mod_proxy",
    "mod_wstunnel",
    "mod_rewrite",
)

# Serve the TRAID single-page application
server.document-root = "/usr/share/traid"

# Proxy WebSocket connections (/ws/) to Uvicorn
$HTTP["url"] =~ "^/ws/" {
    wstunnel.server = (
        "/ws" => ((
            "host" => "127.0.0.1",
            "port" => 8000,
        ))
    )
}

# Proxy REST API calls (/api/) to Uvicorn
$HTTP["url"] =~ "^/api/" {
    proxy.server = (
        "" => ((
            "host" => "127.0.0.1",
            "port" => 8000,
        ))
    )
}

# Fallback: serve index.html for any path that is not a real file
# (enables SPA client-side routing)
url.rewrite-if-not-file = (
    "^/(?!api/|ws/).*" => "/index.html",
)
