# TRAID lighttpd configuration
# Installed to /etc/lighttpd/conf-available/traid.conf
# Enabled by postinst: ln -sf ../conf-available/traid.conf /etc/lighttpd/conf-enabled/traid.conf

server.modules += (
    "mod_proxy",
    "mod_wstunnel",
    "mod_rewrite",
)

# Proxy WebSocket connections (/ws/) to Uvicorn
$HTTP["url"] =~ "^/ws/" {
    wstunnel.server = (
        "/ws" => ((
            "host" => "127.0.0.1",
            "port" => 8000,
        ))
    )
}

# Proxy REST API calls (/api/) to Uvicorn
$HTTP["url"] =~ "^/api/" {
    proxy.server = (
        "" => ((
            "host" => "127.0.0.1",
            "port" => 8000,
        ))
    )
}

# SPA fallback: serve index.html for any path that is not a real file
url.rewrite-if-not-file = (
    "^/(?!api/|ws/).*" => "/index.html",
)
